<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="../icons/icon-192.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <title>Přidat sen</title>
  </head>

  <body>
    <main class="add-dream-page">
      <a href="../index.html" class="back-link">← Zpět</a>

      <header class="add-dream-header">
        <h1>Přidat sen</h1>
      </header>

      <form id="dreamForm">
        <div class="form-field">
          <label for="dreamName">Název snu</label>

          <input
            type="text"
            id="dreamName"
            name="dream_name"
            placeholder="Např. Vidět východ slunce v nejdelší den v roce"
          />
        </div>

        <div class="form-field">
          <label for="dreamDescription">Popis</label>

          <textarea
            id="dreamDescription"
            name="dream_description"
            placeholder="Např. Vidět východ slunce v nejdelší den v roce a maximálně si užít den."
          ></textarea>
        </div>

        <div class="form-field">
          <label for="dreamPinterestBoard">Pinterest board</label>

          <input
            type="url"
            id="dreamPinterestBoard"
            name="dream_pinterest_board"
            placeholder="https://pinterest.com/..."
          />
        </div>

        <div class="form-row form-row-three">
          <div class="form-field">
            <label for="dreamCategory">Kategorie</label>

            <select id="dreamCategory" name="dream_category"></select>
          </div>

          <div class="form-field">
            <label for="dreamPriority">Priorita</label>

            <select id="dreamPriority" name="dream_priority">
              <option value="A">A — Aktivně na tom pracuji</option>
              <option value="B">B — Blízká budoucnost</option>
              <option value="C" selected>C — Čeká na svůj čas</option>
            </select>
          </div>

          <div class="form-field">
            <label for="dreamStatus">Stav snu</label>

            <select id="dreamStatus" name="dream_status">
              <option value="dream_active">Aktivní</option>
              <option value="dream_to_be_completed" selected>
                Do budoucna
              </option>
              <option value="dream_completed">Splněný</option>
              <option value="dream_not_attractive_anymore">Už mě neláká</option>
            </select>
          </div>
        </div>

        <div class="form-field">
          <span class="field-label">Datum splnění</span>

          <div class="date-time-row">
            <div class="date-time-field">
              <label for="dreamDate">Datum</label>
              <input type="date" id="dreamDate" name="dream_completion_date" />
            </div>

            <div class="date-time-field">
              <label for="dreamTime">Čas</label>
              <input type="time" id="dreamTime" name="dream_completion_time" />
            </div>
          </div>
        </div>

        <h2>Kroky ke splnění</h2>

        <div id="subgoalsContainer">
          <div class="subgoal-form">
            <div class="form-field">
              <label for="subgoalName0">Co mě přiblíží ke splnění snu</label>

              <input
                type="text"
                id="subgoalName0"
                name="subgoal_name[]"
                class="subgoal-name"
                placeholder="Např. Půjdu brzy spát"
              />
            </div>

            <div class="form-field">
              <label class="sr-only" for="subgoalDate0">
                Datum splnění kroku
              </label>

              <input
                type="date"
                id="subgoalDate0"
                class="subgoal-date"
                name="subgoal_date[]"
              />

              <label class="sr-only" for="subgoalTime0">
                Čas splnění kroku
              </label>

              <input
                type="time"
                id="subgoalTime0"
                class="subgoal-time"
                name="subgoal_time[]"
              />
            </div>
          </div>
        </div>

        <button type="button" id="addSubgoalButton" class="button-soft">
          Přidat další krok
        </button>

        <button type="submit" id="addDreamButton" class="button-primary">
          Přidat sen
        </button>
      </form>
    </main>

    <script src="../js/shared/constants.js"></script>
    <script src="../js/shared/storage.js"></script>
    <script src="../js/shared/text.js"></script>
    <script src="../js/shared/scroll.js"></script>
    <script src="../js/shared/form-validation.js"></script>

    <script src="../js/shared/categories/category-data.js"></script>
    <script src="../js/shared/categories/category-storage.js"></script>
    <script src="../js/shared/categories/category-ui.js"></script>

    <script src="../js/dreams/core/dream-priority.js"></script>
    <script src="../js/dreams/core/dream-validation.js"></script>

    <script src="../js/components/toast.js"></script>
    <script src="../js/components/confirm-modal.js"></script>

    <script src="../js/dreams/add/add-ui.js"></script>
    <script src="../js/dreams/add/add-subgoals.js"></script>
    <script src="../js/dreams/add/add-draft.js"></script>
    <script src="../js/dreams/add/add-dirty-state.js"></script>
    <script src="../js/dreams/add/add-form.js"></script>
    <script src="../js/dreams/add/add-dream.js"></script>
  </body>
</html>
