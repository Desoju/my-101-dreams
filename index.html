<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#06b6d4" />
    <meta
      name="description"
      content="My 101 Dreams je osobní dream list aplikace pro zapisování snů, cílů a kroků k jejich splnění."
    />

    <link rel="icon" href="icons/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="css/style.css" />

    <title>My 101 dreams</title>
  </head>

  <body>
    <main class="home-page">
      <!-- Header -->
      <header class="home-sticky-top">
        <h1>Mých 101 snů</h1>
      </header>

      <!-- Stats -->
      <section class="home-stats" aria-label="Statistiky snů">
        <div
          class="stat-card"
          data-filter-type="status"
          data-filter-value="dream_completed"
        >
          <span id="globalDreamProgress">0 / 0</span>
          <p>Splněné sny</p>
        </div>

        <div
          class="stat-card"
          data-filter-type="status"
          data-filter-value="dream_active"
        >
          <span id="activeDreams">0</span>
          <p>Aktivní</p>
        </div>

        <div
          class="stat-card"
          data-filter-type="status"
          data-filter-value="dream_to_be_completed"
        >
          <span id="futureDreams">0</span>
          <p>Do budoucna</p>
        </div>

        <div
          class="stat-card"
          data-filter-type="priority"
          data-filter-value="A"
        >
          <span id="priorityACount">0</span>
          <p>Priorita A</p>
        </div>

        <div
          class="stat-card"
          data-filter-type="priority"
          data-filter-value="B"
        >
          <span id="priorityBCount">0</span>
          <p>Priorita B</p>
        </div>

        <div
          class="stat-card"
          data-filter-type="priority"
          data-filter-value="C"
        >
          <span id="priorityCCount">0</span>
          <p>Priorita C</p>
        </div>
      </section>

      <button
        type="button"
        id="installAppButton"
        class="home-action-button button-primary hidden"
      >
        Nainstalovat aplikaci
      </button>

      <!-- App actions -->
      <section class="home-actions" aria-label="Akce aplikace">
        <a
          href="pages/categories.html"
          class="home-action-button button-secondary"
        >
          Spravovat kategorie
        </a>

        <button
          type="button"
          id="exportDataButton"
          class="home-action-button button-primary"
        >
          Export dat
        </button>

        <div class="settings-action-with-helper">
          <button
            type="button"
            id="importDataButton"
            class="button button-secondary"
          >
            Import dat
          </button>

          <input
            type="file"
            id="importDataInput"
            accept="application/json,.json"
            hidden
          />

          <p class="settings-helper-text">
            Import data bezpečně sloučí a nesmaže současné sny.
          </p>
        </div>

        <input type="file" id="importDataInput" accept=".json" hidden />

        <button
          type="button"
          id="restoreBackupButton"
          class="home-action-button button-soft hidden"
        >
          Obnovit poslední zálohu
        </button>
      </section>

      <!-- Search and filters -->
      <div class="home-sticky-content">
        <section class="search-filter-section" aria-label="Vyhledávání a filtr">
          <input
            type="text"
            id="dreamSearchInput"
            class="dream-search-input"
            placeholder="Vyhledat sen..."
          />

          <button
            type="button"
            id="toggleFiltersButton"
            class="filter-icon-button button-primary"
          >
            Filtr
          </button>
        </section>

        <section id="filtersPanel" class="filters-panel hidden">
          <div class="filters-row">
            <div class="filters-inline-group">
              <p class="filter-group-title">Priority</p>

              <div class="priority-filter-list">
                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="priority-filter-checkbox"
                    value="A"
                  />
                  A
                </label>

                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="priority-filter-checkbox"
                    value="B"
                  />
                  B
                </label>

                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="priority-filter-checkbox"
                    value="C"
                  />
                  C
                </label>
              </div>
            </div>

            <div class="filters-inline-group">
              <p class="filter-group-title">Stavy</p>

              <div class="status-filter-list">
                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="status-filter-checkbox"
                    value="dream_active"
                  />
                  Aktivní
                </label>

                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="status-filter-checkbox"
                    value="dream_to_be_completed"
                  />
                  Do budoucna
                </label>

                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="status-filter-checkbox"
                    value="dream_completed"
                  />
                  Splněné
                </label>

                <label class="checkbox-filter">
                  <input
                    type="checkbox"
                    class="status-filter-checkbox"
                    value="dream_not_attractive_anymore"
                  />
                  Už mě neláká
                </label>
              </div>
            </div>
          </div>

          <p class="filter-group-title">Kategorie</p>

          <div id="categoryFilterList" class="category-filter-list"></div>

          <div class="filters-bottom-row">
            <label class="checkbox-filter">
              <input type="checkbox" id="showInactiveDreams" />
              Zobrazit i sny, které mě už nelákají
            </label>

            <button type="button" id="clearFiltersButton" class="button-soft">
              Vyčistit filtry
            </button>
          </div>
        </section>
      </div>

      <!-- Dreams list -->
      <section class="dreams-section" aria-label="Seznam snů">
        <div id="dreamList" class="dream-list"></div>
      </section>

      <!-- Floating action -->
      <a
        href="pages/add-dream.html"
        class="floating-add-button"
        aria-label="Přidat nový sen"
      ></a>

      <!-- PWA update UI -->
      <div id="updateBanner" class="update-banner hidden">
        <p>Je dostupná nová verze aplikace.</p>

        <button type="button" id="updateAppButton" class="button-primary">
          Aktualizovat
        </button>
      </div>
    </main>

    <!-- Shared utilities -->
    <script src="js/shared/storage.js"></script>
    <script src="js/shared/dates.js"></script>
    <script src="js/shared/text.js"></script>
    <script src="js/shared/backup.js"></script>

    <!-- Categories -->
    <script src="js/shared/categories/category-data.js"></script>
    <script src="js/shared/categories/category-storage.js"></script>
    <script src="js/shared/categories/category-ui.js"></script>

    <!-- Dream core -->
    <script src="js/dreams/core/dream-status.js"></script>
    <script src="js/dreams/core/dream-priority.js"></script>
    <script src="js/dreams/core/dream-progress.js"></script>
    <script src="js/dreams/core/dream-stats.js"></script>

    <!-- Filters -->
    <script src="js/dreams/filters/filter-sort.js"></script>
    <script src="js/dreams/filters/filter-logic.js"></script>
    <script src="js/dreams/filters/filter-ui.js"></script>
    <script src="js/dreams/filters/filter-setup.js"></script>

    <!-- Components -->
    <script src="js/components/dream-card.js"></script>
    <script src="js/components/skeleton.js"></script>
    <script src="js/components/empty-state.js"></script>
    <script src="js/components/stat-card.js"></script>
    <script src="js/components/toast.js"></script>
    <script src="js/components/confirm-modal.js"></script>
    <script src="js/components/onboarding.js"></script>

    <!-- Home page -->
    <script src="js/dreams/home/index-stats.js"></script>
    <script src="js/dreams/home/index-render.js"></script>
    <script src="js/dreams/home/index-stat-filters.js"></script>
    <script src="js/dreams/home/index.js"></script>

    <!-- PWA -->
    <script src="js/pwa/pwa-install.js"></script>
    <script src="js/pwa/pwa-update.js"></script>
  </body>
</html>
